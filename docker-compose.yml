services:
  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: app
    ports:
      - "80:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/devops
      - PORT=5000
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
